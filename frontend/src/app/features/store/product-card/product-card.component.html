<div class="product-card" (mouseenter)="isHovered = true" (mouseleave)="isHovered = false" (click)="openQuickView()">
    <div class="image-wrapper">
        <!-- Image zooms slightly internally via animation trigger -->
        <img [src]="getImageUrl() || 'assets/placeholder-image.png'" alt="Product image" title="Product image"
            [attr.alt]="getItemName(item)" [attr.title]="getItemName(item)" class="product-image"
            [@cardHoverZoom]="isHovered ? 'hovered' : 'default'" />
    </div>

    <div class="product-info">
        <div class="product-details">
            <div class="product-header">
                <h3 class="product-name">{{ getItemName(item) }}</h3>
                @if(item?.vatPercentage > 0) {
                <span class="vat-badge">{{ 'STORE.VAT_INCL' | translate }}</span>
                }
            </div>
            <div class="product-price">
                {{ item?.netTotal | number:'1.0-0' }}
                <span class="sar-icon">₪</span>
            </div>
        </div>

        <button mat-mini-fab class="add-btn" [class.success-state]="addedToCart" (click)="addToCart($event, item)"
            [attr.aria-label]="(addedToCart ? 'FORM.SAVE' : 'STORE.ADD_TO_CART') | translate">
            <mat-icon>{{ addedToCart ? 'check' : 'add' }}</mat-icon>
        </button>
    </div>
</div>
